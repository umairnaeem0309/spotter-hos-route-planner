[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
testpaths = apps
filterwarnings =
    # WhiteNoise warns that STATIC_ROOT has no directory yet; collectstatic is
    # not run in the test suite, so this is expected and irrelevant to tests.
    ignore:No directory at:UserWarning
